<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>top-nav</title>

  <style>
    :root {
      --bg: #f6f5f2;
      --surface: #ffffff;
      --soft: #faf9f6;
      --ink: #171717;
      --muted: #74716a;
      --line: #e6e2d8;
      --shadow: 0 28px 80px rgba(20, 20, 20, 0.12);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.9), transparent 35%),
        var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    textarea {
      font: inherit;
    }

    .screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .app {
      width: min(420px, 100%);
      height: min(860px, calc(100vh - 44px));
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 36px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .top {
      padding: 18px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
    }

    .app-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .mark {
      width: 32px;
      height: 32px;
      border-radius: 11px;
      background: var(--ink);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .capture {
      width: 100%;
      height: 104px;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 15px;
      background: white;
      color: var(--ink);
      resize: none;
      outline: none;
      line-height: 1.45;
      font-size: 15px;
    }

    .spine {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: white;
      scrollbar-width: none;
    }

    .spine::-webkit-scrollbar {
      display: none;
    }

    .spine button {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--muted);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.04em;
      cursor: pointer;
    }

    .spine button.active {
      background: var(--ink);
      border-color: var(--ink);
      color: white;
    }

    .body {
      flex: 1;
      overflow: auto;
      padding: 18px;
    }

    .eyebrow {
      display: inline-flex;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 0.92;
      letter-spacing: -0.075em;
    }

    .layer-copy {
      color: var(--muted);
      margin: 12px 0 18px;
      font-size: 15px;
      line-height: 1.45;
    }

    .objects {
      display: grid;
      gap: 10px;
    }

    .object {
      border: 1px solid var(--line);
      background: white;
      border-radius: 19px;
      padding: 15px;
      cursor: pointer;
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
    }

    .object:active {
      transform: scale(0.985);
    }

    .object.selected {
      border-color: var(--ink);
      background: #fffefa;
      box-shadow: inset 0 0 0 1px var(--ink);
    }

    .object strong {
      display: block;
      font-size: 17px;
      letter-spacing: -0.03em;
      margin-bottom: 5px;
    }

    .object span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .tray {
      border-top: 1px solid var(--line);
      background: var(--soft);
      padding: 14px 18px 18px;
    }

    .tray-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 850;
      margin-bottom: 10px;
    }

    .count {
      color: var(--muted);
      font-weight: 750;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-height: 33px;
      margin-bottom: 12px;
    }

    .pill {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 7px 0;
    }

    .submit {
      width: 100%;
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: white;
      padding: 14px 18px;
      font-weight: 850;
      cursor: pointer;
      font-size: 15px;
    }

    .submit:active {
      transform: scale(0.99);
    }

    .receipt {
      display: none;
      margin-top: 12px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 18px;
      padding: 13px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .receipt.show {
      display: block;
    }

    .receipt strong {
      color: var(--ink);
    }

    @media (max-width: 460px) {
      .screen {
        padding: 0;
      }

      .app {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        border: 0;
      }
    }
  </style>
</head>

<body>
  <main class="screen">
    <section class="app">
      <header class="top">
        <div class="app-bar">
          <div class="brand">
            <div class="mark">#</div>
            <span>top-nav</span>
          </div>
          <div class="small">capture layer</div>
        </div>

        <textarea id="capture" class="capture">They had the rooms. This gives the rooms grammar.</textarea>
      </header>

      <nav id="spine" class="spine" aria-label="Primary layers"></nav>

      <section class="body">
        <div class="eyebrow">Primary Layer</div>
        <h1 id="layerTitle">CAPTURE</h1>
        <p id="layerCopy" class="layer-copy">Raw input enters.</p>
        <div id="objects" class="objects"></div>
      </section>

      <footer class="tray">
        <div class="tray-head">
          <span>Selected #tab objects</span>
          <span id="count" class="count">0</span>
        </div>

        <div id="pills" class="pills">
          <div class="empty">Select from any layer.</div>
        </div>

        <button id="submit" class="submit">Submit Capture</button>

        <div id="receipt" class="receipt"></div>
      </footer>
    </section>
  </main>

  <script>
    const layers = [
      {
        label: "CAPTURE",
        copy: "Raw input enters.",
        objects: [
          ["#capture", "raw signal entering the system"],
          ["#inbox", "unsorted intake"],
          ["#signal", "notable input"]
        ]
      },
      {
        label: "STRUCTURE",
        copy: "Raw input gets shaped.",
        objects: [
          ["#structure", "organized meaning"],
          ["#model", "reusable shape"],
          ["#scope", "defined boundary"]
        ]
      },
      {
        label: "COORDINATE",
        copy: "People, timing, ownership, and movement align.",
        objects: [
          ["#coordinate", "alignment"],
          ["#owner", "responsibility"],
          ["#handoff", "movement"]
        ]
      },
      {
        label: "BUILD",
        copy: "Ideas become assets or systems.",
        objects: [
          ["#build", "creation"],
          ["#asset", "reusable output"],
          ["#system", "working structure"]
        ]
      },
      {
        label: "EXECUTE",
        copy: "Work gets done.",
        objects: [
          ["#execute", "action"],
          ["#task", "work item"],
          ["#next", "next move"]
        ]
      },
      {
        label: "DOCUMENT",
        copy: "Decisions and knowledge are preserved.",
        objects: [
          ["#document", "preserve"],
          ["#decision", "recorded choice"],
          ["#learning", "reusable lesson"]
        ]
      },
      {
        label: "AGGREGATE",
        copy: "Scattered inputs become larger patterns.",
        objects: [
          ["#aggregate", "combine"],
          ["#pattern", "repetition"],
          ["#summary", "compression"]
        ]
      },
      {
        label: "IMPROVE",
        copy: "The system learns from itself.",
        objects: [
          ["#improve", "refinement"],
          ["#friction", "slow point"],
          ["#optimize", "better path"]
        ]
      }
    ];

    const spine = document.getElementById("spine");
    const layerTitle = document.getElementById("layerTitle");
    const layerCopy = document.getElementById("layerCopy");
    const objects = document.getElementById("objects");
    const pills = document.getElementById("pills");
    const count = document.getElementById("count");
    const receipt = document.getElementById("receipt");
    const capture = document.getElementById("capture");

    let active = 0;
    let selected = {};

    function render() {
      spine.innerHTML = "";

      layers.forEach((layer, index) => {
        const button = document.createElement("button");
        button.textContent = layer.label;
        button.className = index === active ? "active" : "";
        button.onclick = () => {
          active = index;
          receipt.classList.remove("show");
          render();
        };
        spine.appendChild(button);
      });

      const layer = layers[active];

      layerTitle.textContent = layer.label;
      layerCopy.textContent = layer.copy;

      objects.innerHTML = "";

      layer.objects.forEach(([tag, meaning]) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "object" + (selected[tag] ? " selected" : "");
        card.innerHTML = `<strong>${tag}</strong><span>${meaning}</span>`;

        card.onclick = () => {
          if (selected[tag]) {
            delete selected[tag];
          } else {
            selected[tag] = {
              tag,
              meaning,
              layer: layer.label
            };
          }

          receipt.classList.remove("show");
          render();
        };

        objects.appendChild(card);
      });

      const tags = Object.keys(selected);

      count.textContent = `${tags.length} selected`;

      pills.innerHTML = tags.length
        ? tags.map(tag => `<div class="pill">${tag}</div>`).join("")
        : `<div class="empty">Select from any layer.</div>`;
    }

    document.getElementById("submit").onclick = () => {
      const items = Object.values(selected);

      if (!items.length) {
        receipt.innerHTML = "<strong>No #tab objects selected.</strong><br>Select at least one before submitting.";
        receipt.classList.add("show");
        return;
      }

      const grouped = items
        .map(item => `${item.layer}: ${item.tag}`)
        .join(" · ");

      receipt.innerHTML = `
        <strong>Submitted.</strong><br>
        Capture: ${capture.value}<br>
        #tab objects: ${grouped}
      `;

      receipt.classList.add("show");
    };

    render();
  </script>
</body>
</html>
